<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion de obras | Alejandra Stier</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Volver al sitio">Alejandra Stier</a>
      <nav class="nav" aria-label="Gestion">
        <a href="index.html">Ver sitio</a>
      </nav>
    </header>

    <main>
      <section class="admin-hero">
        <p class="eyebrow">Gestion privada</p>
        <h1>Visibilidad de obras</h1>
        <p>
          Esta pantalla permite ocultar o mostrar piezas ya cargadas en el sitio. Para sumar nuevas
          obras, se agregan las imagenes y datos al repositorio y se vuelve a publicar.
        </p>
      </section>

      <section class="admin-panel is-standalone" aria-label="Gestion de obras">
        <div class="admin-layout">
          <div>
            <h2>Mostrar en galeria</h2>
            <div class="admin-list" id="visibilityList"></div>
          </div>
          <div>
            <h2>Mas vistas</h2>
            <div class="stats-list" id="statsList"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="artworks.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
